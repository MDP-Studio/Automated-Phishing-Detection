name: CI

# Runs on every push and PR to main. Independent jobs:
#   1. test       - full pytest suite on a fresh checkout against the locked
#                   dependency set. This is the "fresh clone catches things
#                   local-pass misses" gate from the cycle 4 review.
#   2. browser-smoke - Playwright dashboard chart check under strict CSP.
#   3. lint       - flake8 hygiene check.
#   4. pip-audit  - supply-chain CVE scan against requirements.lock.
#                   Fails the build on any high or critical advisory.
#   5. sigma-conversion - CI-only pySigma conversion check for exported rules.
#   6. cti-compatibility-report - signed STIX/TAXII/Sigma compatibility
#                   report artifact for release and nightly evidence.
#
# All jobs install from `requirements.lock` (hash-pinned) so the build is
# reproducible. Re-pin by running locally:
#     uv pip compile requirements.txt -o requirements.lock --generate-hashes --python-version 3.11
# and committing the result.

on:
  push:
    branches: [main]
  # `pull_request` covers feature branches without burning CI minutes
  # on every personal scratch push. Verified by the cycle 7 sanity
  # check (run id 24403600695): a deliberately-red branch must be
  # opened as a PR to trigger CI. A `push:` trigger on all branches
  # was considered and rejected as needlessly expensive.
  pull_request:
    branches: [main]
  # Daily run so freshly disclosed CVEs against pinned versions surface
  # without waiting for the next code change.
  schedule:
    - cron: "17 4 * * *"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (fresh checkout)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libs needed by pyzbar / opencv / playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libzbar0 \
              libgomp1

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          # --require-hashes enforces the hash pins in requirements.lock.
          # If anything in the lock file is tampered with, install fails.
          pip install --require-hashes -r requirements.lock

      - name: Run pytest
        run: |
          python -m pytest -q --tb=short

      - name: Validate signed export self-test
        run: python scripts/validate_exports.py --self-test

  sigma-conversion:
    name: Sigma converter validation
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Install CI-only Sigma converter tooling
        run: |
          pip install pysigma==1.3.3 pysigma-backend-splunk==2.1.0

      - name: Convert Sigma rules through pySigma Splunk backend
        run: |
          python scripts/sigma_convert_check.py --backend splunk --require-converter

  cti-compatibility-report:
    name: Signed CTI compatibility report
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Install CI-only Sigma converter tooling
        run: |
          pip install pysigma==1.3.3 pysigma-backend-splunk==2.1.0

      - name: Build signed CTI compatibility report
        env:
          CTI_COMPAT_EXPORT_SIGNING_PRIVATE_KEY_B64: ${{ secrets.CTI_COMPAT_EXPORT_SIGNING_PRIVATE_KEY_B64 }}
          CTI_COMPAT_EXPORT_SIGNING_KEY_ID: ${{ vars.CTI_COMPAT_EXPORT_SIGNING_KEY_ID }}
          CTI_COMPAT_REPORT_SIGNING_PRIVATE_KEY_B64: ${{ secrets.CTI_COMPAT_REPORT_SIGNING_PRIVATE_KEY_B64 }}
          CTI_COMPAT_REPORT_SIGNING_KEY_ID: ${{ vars.CTI_COMPAT_REPORT_SIGNING_KEY_ID }}
          TAXII_OBJECTS_URL: ${{ secrets.OPENCTI_TAXII_OBJECTS_URL }}
          TAXII_BEARER_TOKEN: ${{ secrets.OPENCTI_TAXII_BEARER_TOKEN }}
          TAXII_TIMEOUT_SECONDS: "15"
          TAXII_VERIFY_TLS: "false"
        run: |
          TAXII_MODE="dry-run"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "release" ]; then
            TAXII_MODE="live-if-configured"
          fi
          python scripts/cti_compatibility_report.py \
            --output-dir reports/cti-compatibility \
            --sigma-backend splunk \
            --require-sigma-converter \
            --taxii-mode "$TAXII_MODE"

      - name: Validate CTI freshness pins and mappings
        run: |
          python scripts/validate_cti_freshness.py \
            --cti-report reports/cti-compatibility/cti_compatibility_report.json \
            --status-output reports/cti-compatibility/cti_freshness_status.json

      - name: Upload CTI compatibility artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cti-compatibility-report
          path: reports/cti-compatibility/

  browser-smoke:
    name: Dashboard browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libs needed by app imports
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libzbar0 \
              libgomp1

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Verify vendored Chart.js asset
        run: python scripts/vendor_chartjs.py --check

      - name: Run dashboard chart smoke check
        env:
          ANALYST_API_TOKEN: ci-dashboard-browser-token
        run: python scripts/dashboard_browser_check.py

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 (errors only)
        # Only block on real errors (E9, F63, F7, F82). Style-only warnings
        # are reported but non-blocking so the gate stays useful.
        run: |
          flake8 src tests main.py \
              --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src tests main.py \
              --count --max-line-length=120 --statistics --exit-zero

  pip-audit:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Official PyPA action. Failure semantics, verified via the action's
      # own action.yml: `internal-be-careful-allow-failure` defaults to
      # `false`, which means any non-zero exit from pip-audit fails the
      # job. pip-audit itself exits 1 on any vulnerability finding, so
      # this configuration IS strict-by-default. If you ever need to
      # tolerate a specific CVE, use `internal-be-careful-extra-flags`
      # with `--ignore-vuln <id>` AND document the expiry date in the
      # PR description so it doesn't become a permanent allowance.
      - name: Run pip-audit on requirements.lock
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements.lock
