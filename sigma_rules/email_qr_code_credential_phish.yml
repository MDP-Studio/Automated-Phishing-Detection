title: QR-Encoded Credential Phishing (Quishing)
id: 4d2e6c98-7b1a-43e2-8fa5-15c0d2e9b34a
status: experimental
description: |
  Triggers when the QR decoder extracts a URL from an inline image, PDF, or
  rendered HTML attachment AND the URL reputation analyzer flags it as
  malicious or the URL points to a credential-harvesting page. Quishing
  bypasses most legacy mail filters because they do not OCR images.
references:
  - https://attack.mitre.org/techniques/T1566/002/
  - https://attack.mitre.org/techniques/T1204/001/
author: Automated Phishing Detection Pipeline
date: 2026/04/14
logsource:
  product: phishing_detection_pipeline
  category: verdict
detection:
  selection_qr_url_present:
    extracted_urls.source:
      - qr_code
      - qr_code_pdf
      - qr_code_docx
      - qr_code_html_rendered
  selection_qr_url_malicious:
    analyzer_results.url_reputation.risk_score|gte: 0.5
  selection_intent_credential:
    analyzer_results.nlp_intent.details.intent_classification.category: credential_harvesting
  condition: selection_qr_url_present and (selection_qr_url_malicious or selection_intent_credential)
fields:
  - email_id
  - extracted_urls.url
  - extracted_urls.source
  - analyzer_results.nlp_intent.details.intent_classification.category
falsepositives:
  - Legitimate vendor mail using QR codes for two-factor enrollment
  - Conference / event QR codes pointing to legitimate registration pages
level: high
tags:
  - attack.initial_access
  - attack.user_execution
  - attack.t1566.002
  - attack.t1204.001
